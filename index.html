<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>준비 중입니다</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap">
<style>
  :root {
    --accent: #00A44F;
    --ink: #0A231A;
    --muted: #6b7a72;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Noto Sans KR", sans-serif;
    background:
      radial-gradient(1100px 600px at 50% -10%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 60%),
      #ffffff;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    padding: 24px;
  }
  .card {
    max-width: 480px;
    text-align: center;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 15px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 26px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 22%, transparent);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  h1 {
    margin: 0 0 14px;
    font-size: 34px;
    font-weight: 900;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  p {
    margin: 0;
    font-size: 15px;
    line-height: 1.7;
    color: var(--muted);
    word-break: keep-all;
  }
  .sig {
    margin-top: 34px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  @media (max-width: 480px) {
    h1 { font-size: 27px; }
  }
</style>
</head>
<body>
  <main class="card">
    <span class="badge"><span class="dot"></span>PREPARING</span>
    <h1>준비 중입니다</h1>
    <p>더 나은 모습으로 곧 다시 찾아뵙겠습니다.<br>페이지를 잠시 정비하고 있어요.</p>
    <div class="sig">최재봉 · 유학 컨설팅 × AI 콘텐츠</div>
  </main>
</body>
</html>
